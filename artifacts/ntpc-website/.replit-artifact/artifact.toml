kind = "web"
previewPath = "/"
title = "New Testament Priests Church"
version = "1.0.0"
id = "artifacts/ntpc-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21638

[services.development]
run = "pnpm --filter @workspace/ntpc-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ntpc-website", "run", "build" ]
publicDir = "artifacts/ntpc-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21638"
BASE_PATH = "/"
