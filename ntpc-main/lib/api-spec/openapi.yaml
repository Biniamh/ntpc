openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: New Testament Priests Church API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: support
    description: Ministry support form submissions
  - name: membership
    description: Membership/join requests
  - name: posts
    description: Weekly church posts
  - name: events
    description: Upcoming events
  - name: scripture
    description: Daily scripture
  - name: departments
    description: Church departments
  - name: ey-events
    description: Excellent Youth events
  - name: ey-rounds
    description: Excellent Youth rounds
  - name: ey-participants
    description: Excellent Youth participants
  - name: ey-coordinators
    description: Excellent Youth coordinators
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin or members login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /support:
    get:
      operationId: listSupportSubmissions
      tags: [support]
      summary: List all ministry support form submissions (admin only)
      responses:
        "200":
          description: List of support submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportSubmission"
    post:
      operationId: createSupportSubmission
      tags: [support]
      summary: Submit a ministry support form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportSubmission"
      responses:
        "201":
          description: Submission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportSubmission"

  /membership:
    get:
      operationId: listMembershipRequests
      tags: [membership]
      summary: List all membership join requests (admin/members)
      responses:
        "200":
          description: List of membership requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembershipRequest"
    post:
      operationId: createMembershipRequest
      tags: [membership]
      summary: Submit a membership join request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMembershipRequest"
      responses:
        "201":
          description: Request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipRequest"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List all weekly church posts
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new weekly post (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePost"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    put:
      operationId: updatePost
      tags: [posts]
      summary: Update a post (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePost"
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all upcoming events
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an upcoming event (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvent"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    put:
      operationId: updateEvent
      tags: [events]
      summary: Update an event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvent"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /scripture:
    get:
      operationId: getLatestScripture
      tags: [scripture]
      summary: Get the latest daily scripture
      responses:
        "200":
          description: Latest scripture
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scripture"
    post:
      operationId: createScripture
      tags: [scripture]
      summary: Post a new daily scripture (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScripture"
      responses:
        "201":
          description: Scripture created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scripture"

  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all church departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get a single department with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /ey-events:
    get:
      operationId: listEyEvents
      tags: [ey-events]
      summary: List all Excellent Youth events
      responses:
        "200":
          description: List of EY events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EyEvent"
    post:
      operationId: createEyEvent
      tags: [ey-events]
      summary: Create an Excellent Youth event (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEyEvent"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EyEvent"

  /ey-events/{id}:
    get:
      operationId: getEyEvent
      tags: [ey-events]
      summary: Get a single EY event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The EY event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EyEvent"
    put:
      operationId: updateEyEvent
      tags: [ey-events]
      summary: Update an EY event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEyEvent"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EyEvent"
    delete:
      operationId: deleteEyEvent
      tags: [ey-events]
      summary: Delete an EY event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /ey-rounds:
    get:
      operationId: listEyRounds
      tags: [ey-rounds]
      summary: List all Excellent Youth rounds
      responses:
        "200":
          description: List of EY rounds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EyRound"
    post:
      operationId: createEyRound
      tags: [ey-rounds]
      summary: Create an Excellent Youth round (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEyRound"
      responses:
        "201":
          description: Round created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EyRound"

  /ey-rounds/{id}:
    put:
      operationId: updateEyRound
      tags: [ey-rounds]
      summary: Update an EY round (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEyRound"
      responses:
        "200":
          description: Round updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EyRound"
    delete:
      operationId: deleteEyRound
      tags: [ey-rounds]
      summary: Delete an EY round (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /ey-participants:
    get:
      operationId: listEyParticipants
      tags: [ey-participants]
      summary: List all Excellent Youth participants
      responses:
        "200":
          description: List of EY participants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EyParticipant"
    post:
      operationId: createEyParticipant
      tags: [ey-participants]
      summary: Register an Excellent Youth participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEyParticipant"
      responses:
        "201":
          description: Participant registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EyParticipant"

  /ey-participants/{id}:
    put:
      operationId: updateEyParticipant
      tags: [ey-participants]
      summary: Update an EY participant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEyParticipant"
      responses:
        "200":
          description: Participant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EyParticipant"
    delete:
      operationId: deleteEyParticipant
      tags: [ey-participants]
      summary: Delete an EY participant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /ey-coordinators:
    get:
      operationId: listEyCoordinators
      tags: [ey-coordinators]
      summary: List all Excellent Youth coordinators
      responses:
        "200":
          description: List of EY coordinators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EyCoordinator"
    post:
      operationId: createEyCoordinator
      tags: [ey-coordinators]
      summary: Create an Excellent Youth coordinator (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEyCoordinator"
      responses:
        "201":
          description: Coordinator created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EyCoordinator"

  /ey-coordinators/{id}:
    put:
      operationId: updateEyCoordinator
      tags: [ey-coordinators]
      summary: Update an EY coordinator (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEyCoordinator"
      responses:
        "200":
          description: Coordinator updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EyCoordinator"
    delete:
      operationId: deleteEyCoordinator
      tags: [ey-coordinators]
      summary: Delete an EY coordinator (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        role:
          type: string
          enum: [admin, members]
        token:
          type: string
      required:
        - role
        - token

    SupportSubmission:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        occupation:
          type: string
        amountPerMonth:
          type: number
        amountPerYear:
          type: number
        reason:
          type: string
        createdAt:
          type: string
      required:
        - id
        - firstName
        - middleName
        - lastName
        - phone
        - email
        - address
        - occupation
        - amountPerMonth
        - amountPerYear
        - reason
        - createdAt

    CreateSupportSubmission:
      type: object
      properties:
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        occupation:
          type: string
        amountPerMonth:
          type: number
        amountPerYear:
          type: number
        reason:
          type: string
      required:
        - firstName
        - middleName
        - lastName
        - phone
        - email
        - address
        - occupation
        - amountPerMonth
        - amountPerYear
        - reason

    MembershipRequest:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        occupation:
          type: string
        previousChurch:
          type: string
        servingAs:
          type: string
        baptized:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - firstName
        - middleName
        - lastName
        - phone
        - email
        - address
        - occupation
        - previousChurch
        - servingAs
        - baptized
        - createdAt

    CreateMembershipRequest:
      type: object
      properties:
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        occupation:
          type: string
        previousChurch:
          type: string
        servingAs:
          type: string
        baptized:
          type: boolean
      required:
        - firstName
        - middleName
        - lastName
        - phone
        - email
        - address
        - occupation
        - previousChurch
        - servingAs
        - baptized

    Post:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        highlights:
          type: string
        photoUrl:
          type: string
        facebookUrl:
          type: string
        youtubeUrl:
          type: string
        pinned:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - highlights
        - createdAt

    CreatePost:
      type: object
      properties:
        title:
          type: string
        highlights:
          type: string
        photoUrl:
          type: string
        facebookUrl:
          type: string
        youtubeUrl:
          type: string
      required:
        - title
        - highlights

    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        date:
          type: string
        imageUrl:
          type: string
        pinned:
          type: boolean
        category:
          type: string
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - date
        - createdAt

    CreateEvent:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        date:
          type: string
        imageUrl:
          type: string
      required:
        - title
        - description
        - date

    Scripture:
      type: object
      properties:
        id:
          type: integer
        verse:
          type: string
        reference:
          type: string
        createdAt:
          type: string
      required:
        - id
        - verse
        - reference
        - createdAt

    CreateScripture:
      type: object
      properties:
        verse:
          type: string
        reference:
          type: string
      required:
        - verse
        - reference

    Department:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        groupPhotoUrl:
          type: string
        members:
          type: array
          items:
            type: string
        activities:
          type: string
        meetingTime:
          type: string
      required:
        - id
        - name
        - description

    EyEvent:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        imageUrl:
          type: string
        type:
          type: string
        year:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - startDate
        - endDate
        - type
        - year
        - createdAt

    CreateEyEvent:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        imageUrl:
          type: string
        type:
          type: string
        year:
          type: integer
      required:
        - title
        - description
        - startDate
        - endDate
        - type
        - year

    EyRound:
      type: object
      properties:
        id:
          type: integer
        eventId:
          type: integer
        roundNumber:
          type: integer
        capacity:
          type: integer
        fromDate:
          type: string
        toDate:
          type: string
        createdAt:
          type: string
      required:
        - id
        - eventId
        - roundNumber
        - capacity
        - createdAt

    CreateEyRound:
      type: object
      properties:
        eventId:
          type: integer
        roundNumber:
          type: integer
        capacity:
          type: integer
        fromDate:
          type: string
        toDate:
          type: string
      required:
        - eventId
        - roundNumber
        - capacity
        - fromDate
        - toDate

    EyParticipant:
      type: object
      properties:
        id:
          type: integer
        faydaId:
          type: string
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        city:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
        faydaVerified:
          type: boolean
        eventId:
          type: integer
        roundId:
          type: integer
        paymentStatus:
          type: boolean
        registrationNumber:
          type: string
        coordinatorId:
          type: integer
        badgeGenerated:
          type: boolean
        event:
          $ref: "#/components/schemas/EyEvent"
        round:
          $ref: "#/components/schemas/EyRound"
        coordinator:
          $ref: "#/components/schemas/EyCoordinator"
        createdAt:
          type: string
      required:
        - id
        - faydaId
        - firstName
        - lastName
        - city
        - phoneNumber
        - email
        - faydaVerified
        - eventId
        - roundId
        - paymentStatus
        - registrationNumber
        - createdAt

    CreateEyParticipant:
      type: object
      properties:
        faydaId:
          type: string
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        city:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
        eventId:
          type: integer
        roundId:
          type: integer
        paymentMethod:
          type: string
          enum: [bank, telebirr]
        bankReference:
          type: string
        paymentSlip:
          type: string
      required:
        - faydaId
        - firstName
        - lastName
        - city
        - phoneNumber
        - email
        - eventId
        - roundId
        - paymentMethod

    UpdateEyParticipant:
      type: object
      properties:
        faydaId:
          type: string
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        city:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
        faydaVerified:
          type: boolean
        eventId:
          type: integer
        roundId:
          type: integer
        paymentStatus:
          type: boolean
        registrationNumber:
          type: string
        coordinatorId:
          type: integer

    EyCoordinator:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - phone
        - email
        - createdAt

    CreateEyCoordinator:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
      required:
        - name
        - phone
        - email
